<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Jira Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f6f7f3;
            --surface: #ffffff;
            --ink: #152238;
            --muted: #66758f;
            --line: #e4e9f2;
            --primary: #0f9d8a;
            --primary-deep: #0c7d6f;
            --info: #2f80ed;
        }

        body {
            background:
                radial-gradient(1200px 500px at 10% -20%, rgba(15, 157, 138, 0.14), transparent 70%),
                radial-gradient(1000px 500px at 100% 0%, rgba(255, 107, 74, 0.12), transparent 72%),
                var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
        }

        .card-box {
            background: var(--surface);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--line);
            box-shadow: 0 20px 60px rgba(20, 34, 56, 0.14);
        }

        h4 {
            font-family: 'Sora', sans-serif;
            color: var(--ink);
            letter-spacing: -0.02em;
        }

        p.text-muted {
            color: var(--muted) !important;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            border-radius: 10px;
            padding: 10px 16px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            border: 1px solid var(--line);
        }

        .user-chip img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .site-card {
            border: 2px solid var(--line);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: inherit;
        }

        .site-card:hover {
            border-color: var(--primary);
            background: #f2fbf9;
            color: inherit;
        }

        .site-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(120deg, var(--primary), var(--primary-deep));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .site-icon i {
            color: #fff;
            font-size: 1.2rem;
        }

        .site-name {
            font-weight: 700;
            color: var(--ink);
        }

        .site-url {
            font-size: 0.82rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="card-box">
        <h4 class="mb-2 fw-bold">Select your Jira site</h4>
        <p class="text-muted mb-4">You have access to multiple Jira instances. Pick one to continue.</p>

        {% if user %}
        <div class="user-chip">
            {% if user.avatar %}
            <img src="{{ user.avatar }}" alt="avatar">
            {% else %}
            <i class="bi bi-person-circle fs-4"></i>
            {% endif %}
            <div>
                <div class="fw-semibold">{{ user.name or user.email }}</div>
                <div class="text-muted" style="font-size:.8rem">{{ user.email }}</div>
            </div>
        </div>
        {% endif %}

        <form method="POST" action="/select-site">
            {% for site in sites %}
            <button type="submit" name="cloud_id" value="{{ site.id }}"
                class="site-card w-100 text-start border-0 bg-white"
                style="border: 2px solid var(--line) !important; border-radius: 12px;">
                {% if site.avatarUrl %}
                <img src="{{ site.avatarUrl }}"
                    style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0" alt="">
                {% else %}
                <div class="site-icon"><i class="bi bi-building"></i></div>
                {% endif %}
                <div>
                    <div class="site-name">{{ site.name }}</div>
                    <div class="site-url">{{ site.url or (site.id + '.atlassian.net') }}</div>
                </div>
                <i class="bi bi-chevron-right ms-auto text-muted"></i>
            </button>
            {% endfor %}
        </form>

        <div class="mt-4 text-center">
            <a href="/auth/logout" class="text-muted small"><i class="bi bi-box-arrow-left me-1"></i>Sign out</a>
        </div>
    </div>
</body>

</html>
